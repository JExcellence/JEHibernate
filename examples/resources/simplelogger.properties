# ============================================
# SLF4J Simple Logger Configuration
# ============================================
# Place in: src/main/resources/simplelogger.properties
# Only needed if using slf4j-simple. Spring Boot uses Logback instead.

# Default log level (ERROR, WARN, INFO, DEBUG, TRACE)
org.slf4j.simpleLogger.defaultLogLevel=info

# JEHibernate logging
org.slf4j.simpleLogger.log.de.jexcellence.jehibernate=info

# Hibernate SQL logging (set to debug to see SQL queries)
org.slf4j.simpleLogger.log.org.hibernate.SQL=warn
org.slf4j.simpleLogger.log.org.hibernate.orm.jdbc.bind=warn

# Show date/time in log output
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss

# Show thread name (useful for async debugging)
org.slf4j.simpleLogger.showThreadName=true

# Show short logger name instead of full class path
org.slf4j.simpleLogger.showShortLogName=true
