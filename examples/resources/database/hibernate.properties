# ============================================
# JEHibernate Database Configuration
# ============================================
# Place this file in: plugins/<YourPlugin>/database/hibernate.properties
# Use saveResource("database/hibernate.properties", false) in onEnable()
# to copy from JAR to plugin data folder on first run.
#
# Only the active database type's settings are used.
# Driver and dialect are auto-detected, only override if needed.

# ============================================
# Database Type Selection
# ============================================
# Supported: H2, MYSQL, MARIADB, POSTGRESQL, ORACLE, MSSQL_SERVER, SQLITE, HSQLDB
database.type=H2

# ============================================
# H2 (Embedded, no external database required)
# ============================================
# Modes: file (persistent), mem (in-memory, lost on restart)
h2.url=jdbc:h2:file:./plugins/MyPlugin/database/mydb;MODE=MySQL;AUTO_SERVER=TRUE
h2.username=sa
h2.password=
# h2.driver=org.h2.Driver              # auto-detected
# h2.dialect=org.hibernate.dialect.H2Dialect  # auto-detected

# ============================================
# MySQL
# ============================================
# mysql.url=jdbc:mysql://localhost:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
# mysql.username=root
# mysql.password=change_me

# ============================================
# MariaDB
# ============================================
# mariadb.url=jdbc:mariadb://localhost:3306/mydb?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
# mariadb.username=root
# mariadb.password=change_me

# ============================================
# PostgreSQL
# ============================================
# postgresql.url=jdbc:postgresql://localhost:5432/mydb
# postgresql.username=postgres
# postgresql.password=change_me

# ============================================
# Microsoft SQL Server (prefix: mssql)
# ============================================
# mssql.url=jdbc:sqlserver://localhost:1433;databaseName=mydb;encrypt=false
# mssql.username=sa
# mssql.password=change_me

# ============================================
# SQLite (single file, no server)
# ============================================
# sqlite.url=jdbc:sqlite:./plugins/MyPlugin/database/mydb.db

# ============================================
# Hibernate Settings
# ============================================
# Schema management: validate, update, create, create-drop, none
# Use "update" for development, "validate" for production
hibernate.hbm2ddl.auto=update

# SQL logging (disable in production)
hibernate.show_sql=false
hibernate.format_sql=false

# These are set as defaults by JEHibernate — uncomment to override:
# hibernate.jdbc.batch_size=25
# hibernate.order_inserts=true
# hibernate.order_updates=true
# hibernate.query.plan_cache_max_size=2048
